<!-- Dynamic CMS Data Loader — applies design settings and content from JSON files -->
<script>
(async function() {
  try {
    // Load all data files in parallel
    const [design, general, hero, stats, sectors, services, why, cases, accommodation, luderitz, contact, footer] = await Promise.all([
      fetch('/_data/design.json').then(r => r.json()).catch(() => null),
      fetch('/_data/general.json').then(r => r.json()).catch(() => null),
      fetch('/_data/hero.json').then(r => r.json()).catch(() => null),
      fetch('/_data/stats.json').then(r => r.json()).catch(() => null),
      fetch('/_data/sectors.json').then(r => r.json()).catch(() => null),
      fetch('/_data/services.json').then(r => r.json()).catch(() => null),
      fetch('/_data/why.json').then(r => r.json()).catch(() => null),
      fetch('/_data/cases.json').then(r => r.json()).catch(() => null),
      fetch('/_data/accommodation.json').then(r => r.json()).catch(() => null),
      fetch('/_data/luderitz.json').then(r => r.json()).catch(() => null),
      fetch('/_data/contact.json').then(r => r.json()).catch(() => null),
      fetch('/_data/footer.json').then(r => r.json()).catch(() => null),
    ]);

    // ── APPLY DESIGN SETTINGS ──────────────────────────────────
    if (design) {
      const root = document.documentElement;
      const c = design.colours || {};

      // Colours
      if (c.maroon)      { root.style.setProperty('--maroon',      c.maroon); root.style.setProperty('--maroon-light', c.maroon); root.style.setProperty('--maroon-dark', shadeColor(c.maroon, -15)); }
      if (c.gold)        { root.style.setProperty('--gold',        c.gold);   root.style.setProperty('--gold-light',  shadeColor(c.gold, 15)); root.style.setProperty('--gold-dark', shadeColor(c.gold, -15)); }
      if (c.maroon_deep) { root.style.setProperty('--maroon-deep', c.maroon_deep); }
      if (c.off_white)   { root.style.setProperty('--off-white',   c.off_white); }

      // Fonts
      if (design.fonts) {
        const hFont = design.fonts.heading || 'Inter';
        const bFont = design.fonts.body || 'Inter';
        const fontLink = document.createElement('link');
        const googleFonts = [...new Set([hFont, bFont])].filter(f => f !== 'Inter').map(f => f.replace(/ /g, '+')).join('&family=');
        if (googleFonts) {
          fontLink.rel = 'stylesheet';
          fontLink.href = `https://fonts.googleapis.com/css2?family=${googleFonts}:wght@300;400;500;600;700;800&display=swap`;
          document.head.appendChild(fontLink);
        }
        document.body.style.fontFamily = `'${bFont}', sans-serif`;
        document.querySelectorAll('h1,h2,h3,h4,h5,h6').forEach(el => el.style.fontFamily = `'${hFont}', sans-serif`);
      }

      // Button style
      if (design.button_style) {
        const radius = design.button_style === 'rounded' ? '50px' : design.button_style === 'semi' ? '8px' : '3px';
        document.querySelectorAll('.btn, .btn-submit, .nav-cta').forEach(el => el.style.borderRadius = radius);
      }

      // Hero layout
      if (design.hero_layout === 'centred') {
        const hero = document.querySelector('.hero');
        if (hero) {
          hero.style.gridTemplateColumns = '1fr';
          hero.style.textAlign = 'center';
          hero.style.justifyItems = 'center';
        }
        const heroRight = document.querySelector('.hero-right');
        if (heroRight) heroRight.style.display = 'none';
        const heroLeft = document.querySelector('.hero-left');
        if (heroLeft) { heroLeft.style.paddingRight = '0'; heroLeft.style.maxWidth = '800px'; heroLeft.style.margin = '0 auto'; }
      }

      // Logo image override
      if (design.logo && design.logo.image) {
        document.querySelectorAll('.logo-emblem').forEach(el => {
          const img = document.createElement('img');
          img.src = design.logo.image;
          img.style.cssText = 'width:52px;height:52px;object-fit:contain;';
          el.replaceWith(img);
        });
      }

      // Logo text
      if (design.logo) {
        document.querySelectorAll('.logo-name').forEach(el => { if (design.logo.name) el.textContent = design.logo.name; });
        document.querySelectorAll('.logo-tagline').forEach(el => { if (design.logo.tagline) el.textContent = design.logo.tagline; });
      }

      // Section visibility
      if (design.sections) {
        const s = design.sections;
        const toggleSection = (selector, show) => { const el = document.querySelector(selector); if (el) el.style.display = show ? '' : 'none'; };
        toggleSection('.hero',          s.show_hero !== false);
        toggleSection('.trust-bar',     s.show_stats !== false);
        toggleSection('.sectors',       s.show_sectors !== false);
        toggleSection('#services',      s.show_services !== false);
        toggleSection('#about',         s.show_why !== false);
        toggleSection('.cases-section', s.show_cases !== false);
        toggleSection('#accommodation', s.show_accommodation !== false);
        toggleSection('#land',          s.show_luderitz !== false);
        toggleSection('#contact',       s.show_contact !== false);
      }
    }

    // ── GENERAL INFO ───────────────────────────────────────────
    if (general) {
      setText('[data-cms="phone_windhoek"]', general.phone_windhoek);
      setText('[data-cms="phone_luderitz"]', general.phone_luderitz);
      setAttr('[data-cms="phone_windhoek_link"]', 'href', 'tel:' + (general.phone_windhoek || ''));
      setAttr('[data-cms="phone_luderitz_link"]', 'href', 'tel:' + (general.phone_luderitz || ''));
      setText('[data-cms="email_enquiries"]', general.email_enquiries);
      setText('[data-cms="email_bookings"]', general.email_bookings);
      setAttr('[data-cms="email_enquiries_link"]', 'href', 'mailto:' + (general.email_enquiries || ''));
      setAttr('[data-cms="email_bookings_link"]', 'href', 'mailto:' + (general.email_bookings || ''));
      setText('[data-cms="address_windhoek"]', general.address_windhoek);
      if (general.linkedin_url) setAttr('[data-cms="linkedin_url"]', 'href', general.linkedin_url);
    }

    // ── HERO ───────────────────────────────────────────────────
    if (hero) {
      setText('[data-cms="hero_headline_1"]', hero.headline_1);
      setText('[data-cms="hero_headline_2"]', hero.headline_2);
      setText('[data-cms="hero_headline_3"]', hero.headline_3);
      setText('[data-cms="hero_subtext"]', hero.subtext);
      setText('[data-cms="hero_btn_primary"]', hero.btn_primary);
      setText('[data-cms="hero_btn_secondary"]', hero.btn_secondary);
      setText('[data-cms="hero_badge"]', hero.badge);
      if (hero.bg_image) {
        const panel = document.querySelector('.hero-image-panel');
        if (panel) panel.style.backgroundImage = `linear-gradient(135deg,rgba(139,46,46,0.25) 0%,rgba(0,0,0,0.5) 100%), url('${hero.bg_image}')`;
      }
    }

    // ── STATS ──────────────────────────────────────────────────
    if (stats) {
      setText('[data-cms="trust_label"]', stats.trust_label);
      if (stats.items) {
        const nums = document.querySelectorAll('[data-cms="stat_num"]');
        const labels = document.querySelectorAll('[data-cms="stat_label"]');
        stats.items.forEach((item, i) => {
          if (nums[i])   nums[i].textContent   = item.number;
          if (labels[i]) labels[i].textContent = item.label;
        });
      }
    }

    // ── SECTORS ────────────────────────────────────────────────
    if (sectors && sectors.items) {
      const cards = document.querySelectorAll('.sector-card');
      sectors.items.forEach((item, i) => {
        if (!cards[i]) return;
        const icon = cards[i].querySelector('.sector-icon');
        const name = cards[i].querySelector('.sector-name');
        if (icon) icon.textContent = item.icon;
        if (name) name.textContent = item.name;
        if (item.image) {
          const bg = cards[i].querySelector('.sector-bg-div');
          if (bg) bg.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.3)), url('${item.image}')`;
        }
      });
    }

    // ── SERVICES ───────────────────────────────────────────────
    if (services) {
      setText('[data-cms="services_heading"]', services.heading);
      setText('[data-cms="services_desc"]', services.description);
      if (services.items) {
        const cards = document.querySelectorAll('.service-card-v2');
        services.items.forEach((item, i) => {
          if (!cards[i]) return;
          const num   = cards[i].querySelector('.service-num');
          const title = cards[i].querySelector('.service-title');
          const desc  = cards[i].querySelector('.service-desc');
          const img   = cards[i].querySelector('.service-image-div');
          if (num)   num.textContent   = item.number;
          if (title) title.textContent = item.title;
          if (desc)  desc.textContent  = item.description;
          if (img && item.image) img.style.backgroundImage = `url('${item.image}')`;
        });
      }
    }

    // ── WHY ────────────────────────────────────────────────────
    if (why) {
      setText('[data-cms="why_heading_1"]', why.heading_1);
      setText('[data-cms="why_heading_2"]', why.heading_2);
      setText('[data-cms="why_desc"]', why.description);
      if (why.pillars) {
        const pillars = document.querySelectorAll('.pillar');
        why.pillars.forEach((item, i) => {
          if (!pillars[i]) return;
          const icon  = pillars[i].querySelector('.pillar-icon');
          const title = pillars[i].querySelector('h4');
          const desc  = pillars[i].querySelector('p');
          if (icon)  icon.textContent  = item.icon;
          if (title) title.textContent = item.title;
          if (desc)  desc.textContent  = item.description;
        });
      }
    }

    // ── CASES ──────────────────────────────────────────────────
    if (cases) {
      setText('[data-cms="cases_heading"]', cases.heading);
      if (cases.items) {
        const cards = document.querySelectorAll('.case-card');
        cases.items.forEach((item, i) => {
          if (!cards[i]) return;
          const region = cards[i].querySelector('.case-region');
          const title  = cards[i].querySelector('h3');
          const img    = cards[i].querySelector('.case-image-div');
          if (region) region.textContent = item.region;
          if (title)  title.textContent  = item.title;
          if (img && item.image) img.style.backgroundImage = `linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.35)), url('${item.image}')`;
        });
      }
    }

    // ── ACCOMMODATION ──────────────────────────────────────────
    if (accommodation) {
      setText('[data-cms="acc_heading"]', accommodation.heading);
      setText('[data-cms="acc_desc"]', accommodation.description);
      setText('[data-cms="acc_phone"]', accommodation.phone);
      setText('[data-cms="acc_email"]', accommodation.email);
      setAttr('[data-cms="acc_gallery"]', 'href', accommodation.gallery_url);
      if (accommodation.features) {
        const cards = document.querySelectorAll('.vis-card');
        accommodation.features.forEach((item, i) => {
          if (!cards[i]) return;
          const title = cards[i].querySelector('h4');
          const desc  = cards[i].querySelector('p');
          if (title) title.textContent = item.title;
          if (desc)  desc.textContent  = item.description;
        });
      }
    }

    // ── LUDERITZ ───────────────────────────────────────────────
    if (luderitz) {
      setText('[data-cms="lud_heading"]', luderitz.heading);
      setText('[data-cms="lud_size"]', luderitz.size);
      setText('[data-cms="lud_desc"]', luderitz.description);
      setText('[data-cms="lud_highlight_title"]', luderitz.highlight_title);
      setText('[data-cms="lud_highlight_text"]', luderitz.highlight_text);
      if (luderitz.badges) {
        const container = document.querySelector('[data-cms="lud_badges"]');
        if (container) {
          container.innerHTML = luderitz.badges.map(b => `<div class="badge">${b.text}</div>`).join('');
        }
      }
      if (luderitz.checklist) {
        const list = document.querySelector('[data-cms="lud_checklist"]');
        if (list) {
          list.innerHTML = luderitz.checklist.map(i => `<li>${i.text}</li>`).join('');
        }
      }
    }

    // ── CONTACT ────────────────────────────────────────────────
    if (contact) {
      setText('[data-cms="contact_heading_1"]', contact.heading_1);
      setText('[data-cms="contact_heading_2"]', contact.heading_2);
      setText('[data-cms="contact_desc"]', contact.description);
    }

    // ── FOOTER ─────────────────────────────────────────────────
    if (footer) {
      setText('[data-cms="footer_tagline"]', footer.tagline);
      setText('[data-cms="footer_copyright"]', footer.copyright);
    }

  } catch(e) {
    console.log('CMS data load:', e.message);
  }

  function setText(selector, value) {
    if (!value) return;
    document.querySelectorAll(selector).forEach(el => el.textContent = value);
  }
  function setAttr(selector, attr, value) {
    if (!value) return;
    document.querySelectorAll(selector).forEach(el => el.setAttribute(attr, value));
  }
  function shadeColor(color, percent) {
    const num = parseInt(color.replace('#',''), 16);
    const amt = Math.round(2.55 * percent);
    const R = Math.min(255, Math.max(0, (num >> 16) + amt));
    const G = Math.min(255, Math.max(0, (num >> 8 & 0x00FF) + amt));
    const B = Math.min(255, Math.max(0, (num & 0x0000FF) + amt));
    return '#' + (0x1000000 + R*0x10000 + G*0x100 + B).toString(16).slice(1);
  }
})();
</script>

<!-- Netlify Identity Widget — handles login redirects for CMS -->
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      }
    });
  }
</script>

<!-- EmailJS — sends form to davan@aveshe.com without a server -->
<!-- SETUP (one-time, free):
  1. Go to https://www.emailjs.com and create a free account
  2. Add an Email Service (Gmail / Outlook) → note your SERVICE ID
  3. Create an Email Template with these variables:
       {{from_name}}, {{from_company}}, {{from_email}}, {{from_phone}}, {{message}}
     Set "To Email" in the template to: davan@aveshe.com
     Note your TEMPLATE ID
  4. Go to Account > API Keys → copy your PUBLIC KEY
  5. Replace the three placeholder values below with your real IDs -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
  // ── REPLACE THESE THREE VALUES ──────────────────────────────────
  const EMAILJS_PUBLIC_KEY  = 'xCfPXYCm9L6Vkg7J1';   // e.g. 'abc123XYZ'
  const EMAILJS_SERVICE_ID  = 'service_swp5bum';   // e.g. 'service_aveshe'
  const EMAILJS_TEMPLATE_ID = 'template_ctuo6ae';  // e.g. 'template_enquiry'
  // ────────────────────────────────────────────────────────────────

  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

  function sendEnquiry() {
    const name    = document.getElementById('f-name').value.trim();
    const company = document.getElementById('f-company').value.trim();
    const email   = document.getElementById('f-email').value.trim();
    const phone   = document.getElementById('f-phone').value.trim();
    const message = document.getElementById('f-message').value.trim();
    const status  = document.getElementById('form-status');
    const btn     = document.getElementById('enquiryBtn');

    // Basic validation
    if (!name || !email || !message) {
      status.style.display = 'block';
      status.style.color   = '#c0392b';
      status.textContent   = 'Please fill in your name, email and project details.';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Sending…';
    status.style.display = 'none';

    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      from_name:    name,
      from_company: company || '—',
      from_email:   email,
      from_phone:   phone  || '—',
      message:      message,
    })
    .then(() => {
      status.style.display = 'block';
      status.style.color   = '#27ae60';
      status.textContent   = '✓ Message sent! We\'ll be in touch shortly.';
      btn.textContent      = 'Sent ✓';
      // Clear fields
      ['f-name','f-company','f-email','f-phone','f-message'].forEach(id => {
        const el = document.getElementById(id);
        el.value = '';
      });
    })
    .catch((err) => {
      status.style.display = 'block';
      status.style.color   = '#c0392b';
      status.textContent   = 'Error: ' + (err.text || err.message || JSON.stringify(err)) + ' — Please email davan@aveshe.com directly.';
      btn.disabled    = false;
      btn.textContent = 'Send Enquiry ↗';
      console.error('EmailJS error:', err);
    });
  }
</script>
