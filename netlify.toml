<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aveshe Energy Services | Powering Namibia's Future</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --maroon: #8b2e2e;
      --maroon-light: #a34343;
      --maroon-dark: #6a1f1f;
      --maroon-deep: #3d1010;
      --gold: #c9a84c;
      --gold-light: #e0c56a;
      --gold-dark: #a8882e;
      --white: #ffffff;
      --off-white: #f4f4f2;
      --near-black: #111111;
      --text-dark: #1a1a1a;
      --transition: all 0.3s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; scroll-padding-top: 72px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--white); color: var(--text-dark);
      line-height: 1.6; font-weight: 400; -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }

    /* NAVBAR */
    .navbar {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
      background: rgba(255,255,255,0.97); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(139,46,46,0.1);
    }
    .nav-inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 72px; max-width: 1200px; margin: 0 auto; padding: 0 32px;
    }
    .logo-link { text-decoration: none; display: flex; align-items: center; gap: 14px; }
    .logo-emblem { width: 52px; height: 52px; flex-shrink: 0; }
    .logo-text-block { display: flex; flex-direction: column; justify-content: center; gap: 2px; }
    .logo-name { font-size: 1.05rem; font-weight: 700; color: var(--maroon-dark); letter-spacing: -0.01em; line-height: 1.1; }
    .logo-tagline { font-size: 0.6rem; font-weight: 500; color: var(--gold-dark); letter-spacing: 0.12em; text-transform: uppercase; line-height: 1; }
    .nav-links { display: flex; list-style: none; gap: 28px; align-items: center; }
    .nav-links a { color: var(--maroon-dark); text-decoration: none; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--maroon); }
    .nav-cta { background: var(--maroon) !important; color: var(--white) !important; padding: 10px 20px; border-radius: 3px; font-weight: 600 !important; }
    .nav-cta:hover { background: var(--maroon-dark) !important; color: var(--white) !important; }
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 26px; height: 2px; background: var(--maroon-dark); border-radius: 2px; transition: var(--transition); }
    .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .hamburger.active span:nth-child(2) { opacity: 0; }
    .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    /* HERO */
    .hero {
      min-height: 100vh; padding-top: 72px;
      background: linear-gradient(160deg, var(--near-black) 0%, #1c0a0a 50%, var(--maroon-deep) 100%);
      display: grid; grid-template-columns: 1fr 1fr; align-items: center; overflow: hidden;
    }
    .hero-left { padding: 80px 48px 80px 0; position: relative; z-index: 2; }
    .hero-coords { font-size: 0.68rem; letter-spacing: 0.15em; color: rgba(201,168,76,0.5); margin-bottom: 40px; }
    .hero-coords span { display: block; line-height: 1.8; }
    .hero h1 { font-size: clamp(2.6rem, 4.5vw, 4rem); font-weight: 800; line-height: 1.06; color: var(--white); letter-spacing: -0.03em; margin-bottom: 24px; }
    .hero h1 em { font-style: normal; color: var(--gold); }
    .hero-sub { font-size: 0.95rem; color: rgba(255,255,255,0.6); line-height: 1.75; max-width: 440px; margin-bottom: 40px; font-weight: 300; }
    .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 52px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 13px 26px; border-radius: 3px; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none; transition: var(--transition); border: none; cursor: pointer; }
    .btn-primary { background: var(--gold); color: var(--near-black); }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
    .btn-ghost { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.25); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .hero-region { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
    .hero-right { height: 100%; min-height: 100vh; position: relative; }
    .hero-image-panel {
      width: 100%; height: 100%; min-height: 100vh;
      background: linear-gradient(160deg, rgba(61,16,16,0.6) 0%, rgba(17,17,17,0.85) 100%);
      position: relative;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
    }
    .hero-logo-display {
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }
    .hero-logo-emblem { width: 220px; height: 220px; }
    .hero-logo-wordmark {
      text-align: center;
    }
    .hero-logo-wordmark .wm-name {
      display: block; font-size: 2rem; font-weight: 700;
      color: var(--white); letter-spacing: -0.01em; line-height: 1.1;
    }
    .hero-logo-wordmark .wm-tag {
      display: block; font-size: 0.72rem; font-weight: 500;
      color: var(--gold); letter-spacing: 0.22em;
      text-transform: uppercase; margin-top: 6px;
    }
    .hero-badge {
      position: absolute; bottom: 48px; right: 32px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      border: 1px solid rgba(201,168,76,0.3); padding: 18px 22px;
    }
    .hero-badge p { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; line-height: 1.7; color: rgba(255,255,255,0.85); margin: 0; font-weight: 500; }

    /* TRUST BAR */
    .trust-bar { background: var(--off-white); border-bottom: 1px solid rgba(0,0,0,0.07); padding: 52px 0; }
    .trust-inner { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr 1fr; gap: 28px; align-items: center; }
    .trust-label { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--maroon); font-weight: 600; line-height: 1.5; }
    .trust-label strong { display: block; font-size: 0.92rem; font-weight: 700; color: var(--text-dark); margin-top: 8px; line-height: 1.4; }
    .stat-box { text-align: center; padding-left: 16px; border-left: 1px solid rgba(0,0,0,0.08); }
    .stat-num { display: block; font-size: 2.2rem; font-weight: 800; color: var(--maroon); line-height: 1; }
    .stat-desc { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: #999; margin-top: 6px; display: block; }

    /* SECTORS */
    .sectors { background: var(--near-black); }
    .sector-eyebrow { padding: 28px 32px 0; font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(201,168,76,0.55); max-width: 1200px; margin: 0 auto; }
    .sectors-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 20px; }
    .sector-card { position: relative; height: 260px; overflow: hidden; cursor: pointer; }
    .sector-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 100%); z-index: 1; transition: opacity 0.3s; }
    .sector-card:hover::before { opacity: 0.6; }
    .sector-bg-div { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 0.5s ease; }
    .sector-card:hover .sector-bg-div { transform: scale(1.05); }
    .sector-card-1 .sector-bg-div { background-image: linear-gradient(rgba(20,40,60,0.5),rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&auto=format&fit=crop&q=70'); }
    .sector-card-2 .sector-bg-div { background-image: linear-gradient(rgba(20,40,20,0.5),rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1466611653911-95081537e5b7?w=600&auto=format&fit=crop&q=70'); }
    .sector-card-3 .sector-bg-div { background-image: linear-gradient(rgba(40,20,10,0.5),rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1513828583688-c52646db42da?w=600&auto=format&fit=crop&q=70'); }
    .sector-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 26px 22px; z-index: 2; }
    .sector-icon { font-size: 1.3rem; margin-bottom: 8px; display: block; }
    .sector-name { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--white); }
    .sector-arrow { position: absolute; top: 22px; right: 22px; z-index: 2; width: 28px; height: 28px; border: 1px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; color: var(--white); font-size: 0.8rem; transition: var(--transition); }
    .sector-card:hover .sector-arrow { background: var(--gold); border-color: var(--gold); color: var(--near-black); }

    /* SERVICES */
    .services-section { background: var(--white); padding: 80px 0; }
    .services-layout { display: grid; grid-template-columns: 260px 1fr; gap: 60px; align-items: start; }
    .eyebrow { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--maroon); font-weight: 600; margin-bottom: 18px; display: block; }
    .services-intro h2 { font-size: 2rem; font-weight: 800; line-height: 1.1; color: var(--text-dark); letter-spacing: -0.02em; margin-bottom: 20px; }
    .services-intro p { font-size: 0.88rem; color: #666; line-height: 1.75; margin-bottom: 28px; }
    .link-arrow { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--maroon); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; border-bottom: 1px solid rgba(139,46,46,0.3); padding-bottom: 2px; transition: var(--transition); }
    .link-arrow:hover { color: var(--maroon-dark); }
    .services-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .service-card-v2 { border: 1px solid rgba(0,0,0,0.09); border-radius: 3px; overflow: hidden; transition: var(--transition); }
    .service-card-v2:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(139,46,46,0.09); }
    .service-num { padding: 14px 18px 0; font-size: 0.62rem; letter-spacing: 0.1em; color: var(--gold-dark); font-weight: 700; }
    .service-title { padding: 6px 18px 10px; font-size: 0.78rem; font-weight: 700; color: var(--text-dark); line-height: 1.3; text-transform: uppercase; letter-spacing: 0.04em; }
    .service-image-div { width: 100%; height: 130px; background-size: cover; background-position: center; }
    .service-card-v2:nth-child(1) .service-image-div { background-image: url('https://images.unsplash.com/photo-1504328345606-18bbc8c9d7d1?w=400&auto=format&fit=crop&q=70'); }
    .service-card-v2:nth-child(2) .service-image-div { background-image: url('https://images.unsplash.com/photo-1611273426858-450d8e3c9fce?w=400&auto=format&fit=crop&q=70'); }
    .service-card-v2:nth-child(3) .service-image-div { background-image: url('https://images.unsplash.com/photo-1590674899484-d5640e854abe?w=400&auto=format&fit=crop&q=70'); }
    .service-card-v2:nth-child(4) .service-image-div { background-image: url('https://images.unsplash.com/photo-1449965408869-eaa3f722e40d?w=400&auto=format&fit=crop&q=70'); }
    .service-desc { padding: 12px 18px; font-size: 0.76rem; color: #666; line-height: 1.6; }
    .service-link { padding: 8px 18px 16px; font-size: 0.68rem; color: var(--maroon); font-weight: 700; display: block; text-decoration: none; letter-spacing: 0.06em; }

    /* WHY */
    .why-section { background: var(--maroon-deep); padding: 80px 0; }
    .why-top { display: grid; grid-template-columns: 1.1fr 1fr; gap: 60px; margin-bottom: 56px; align-items: end; }
    .why-section .eyebrow { color: rgba(201,168,76,0.65); }
    .why-top h2 { font-size: clamp(2rem, 3.5vw, 3rem); font-weight: 800; color: var(--white); line-height: 1.1; letter-spacing: -0.02em; }
    .why-top p { font-size: 0.88rem; color: rgba(255,255,255,0.5); line-height: 1.75; font-weight: 300; }
    .why-pillars { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
    .pillar { border-top: 1px solid rgba(201,168,76,0.2); padding-top: 24px; }
    .pillar-icon { font-size: 1.5rem; margin-bottom: 12px; display: block; }
    .pillar h4 { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .pillar p { font-size: 0.78rem; color: rgba(255,255,255,0.45); line-height: 1.65; font-weight: 300; }

    /* CASES */
    .cases-section { background: var(--off-white); padding: 80px 0; }
    .cases-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 36px; }
    .cases-header-left .eyebrow { margin-bottom: 8px; }
    .cases-header h2 { font-size: 1.5rem; font-weight: 800; color: var(--text-dark); letter-spacing: -0.02em; }
    .cases-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .case-card { background: var(--white); border: 1px solid rgba(0,0,0,0.07); border-radius: 3px; overflow: hidden; transition: var(--transition); }
    .case-card:hover { border-color: rgba(139,46,46,0.2); box-shadow: 0 6px 20px rgba(0,0,0,0.07); transform: translateY(-2px); }
    .case-image-div { height: 180px; background-size: cover; background-position: center; }
    .case-card:nth-child(1) .case-image-div { background-image: linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.35)), url('https://images.unsplash.com/photo-1587293852726-70cdb56c2866?w=500&auto=format&fit=crop&q=70'); }
    .case-card:nth-child(2) .case-image-div { background-image: linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.35)), url('https://images.unsplash.com/photo-1466611653911-95081537e5b7?w=500&auto=format&fit=crop&q=70'); }
    .case-card:nth-child(3) .case-image-div { background-image: linear-gradient(to bottom,rgba(0,0,0,0.05),rgba(0,0,0,0.35)), url('https://images.unsplash.com/photo-1513828583688-c52646db42da?w=500&auto=format&fit=crop&q=70'); }
    .case-body { padding: 22px; }
    .case-region { font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--maroon); font-weight: 600; margin-bottom: 6px; display: block; }
    .case-body h3 { font-size: 0.95rem; font-weight: 700; color: var(--text-dark); line-height: 1.3; margin-bottom: 14px; }
    .case-link { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--maroon); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .case-link:hover { color: var(--maroon-dark); }

    /* ACCOMMODATION */
    .alt-section { padding: 80px 0; background: var(--white); }
    .alt-section-dark { padding: 80px 0; background: var(--maroon); }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; }
    .two-col.flip { direction: rtl; }
    .two-col.flip > * { direction: ltr; }
    .section-label-pill { display: inline-block; font-size: 0.62rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(201,168,76,0.35); padding: 4px 14px; border-radius: 20px; margin-bottom: 14px; }
    .alt-section h2 { font-size: 1.9rem; font-weight: 800; color: var(--text-dark); line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 12px; }
    .alt-section-dark h2 { font-size: 1.9rem; font-weight: 800; color: var(--gold); line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 12px; }
    .alt-section p { font-size: 0.88rem; color: #555; line-height: 1.75; margin-bottom: 12px; }
    .alt-section-dark p { font-size: 0.88rem; color: rgba(255,255,255,0.75); line-height: 1.75; margin-bottom: 12px; }
    .visual-cards { display: flex; flex-direction: column; gap: 14px; }
    .vis-card { background: var(--off-white); border: 1px solid rgba(0,0,0,0.07); border-radius: 5px; padding: 20px 22px; }
    .vis-card h4 { font-size: 0.82rem; font-weight: 700; color: var(--text-dark); margin-bottom: 5px; }
    .vis-card p { font-size: 0.8rem; color: #666; margin: 0; line-height: 1.6; }
    .badge-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .badge { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 18px; border-radius: 3px; font-size: 0.8rem; font-weight: 600; color: var(--off-white); }
    .checklist { list-style: none; margin-top: 18px; }
    .checklist li { font-size: 0.84rem; color: rgba(255,255,255,0.8); padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; gap: 10px; }
    .checklist li::before { content: '✓'; color: var(--gold); font-weight: 700; flex-shrink: 0; }
    .highlight-box { background: rgba(255,255,255,0.07); border-left: 3px solid var(--gold); padding: 16px 18px; border-radius: 2px; margin-top: 18px; }
    .highlight-box strong { color: var(--gold); display: block; margin-bottom: 4px; font-size: 0.82rem; }
    .highlight-box p { font-size: 0.8rem; color: rgba(255,255,255,0.65); margin: 0; line-height: 1.6; }
    .suite-features { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .feat-box { background: var(--off-white); border: 1px solid rgba(0,0,0,0.07); border-radius: 5px; padding: 18px 14px; text-align: center; }
    .feat-num { font-size: 2rem; font-weight: 800; color: var(--maroon); line-height: 1; }
    .feat-icon { font-size: 1.6rem; color: var(--maroon); }
    .feat-box h4 { font-size: 0.72rem; color: var(--text-dark); font-weight: 600; margin-top: 5px; }
    .suite-cta { background: var(--off-white); border: 1px solid rgba(0,0,0,0.07); border-radius: 5px; padding: 22px; display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
    .suite-cta p { font-size: 0.85rem; color: var(--text-dark); margin: 0; }

    /* CONTACT */
    .contact-section { background: var(--white); padding: 80px 0; }
    .contact-layout { display: grid; grid-template-columns: 1fr 1.1fr 0.85fr; gap: 56px; align-items: start; }
    .contact-intro h2 { font-size: 2.4rem; font-weight: 800; color: var(--text-dark); line-height: 1.1; letter-spacing: -0.02em; margin-bottom: 14px; }
    .contact-intro p { font-size: 0.86rem; color: #666; line-height: 1.75; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-field { border: 1px solid rgba(0,0,0,0.15); padding: 11px 14px; font-family: inherit; font-size: 0.8rem; color: var(--text-dark); background: var(--white); outline: none; width: 100%; border-radius: 2px; transition: border-color 0.2s; }
    .form-field:focus { border-color: var(--maroon); }
    .form-field::placeholder { color: #bbb; }
    .form-field-full { border: 1px solid rgba(0,0,0,0.15); padding: 11px 14px; font-family: inherit; font-size: 0.8rem; color: var(--text-dark); background: var(--white); outline: none; width: 100%; border-radius: 2px; margin-bottom: 10px; resize: vertical; min-height: 80px; transition: border-color 0.2s; }
    .form-field-full:focus { border-color: var(--maroon); }
    .form-field-full::placeholder { color: #bbb; }
    .btn-submit { background: var(--near-black); color: var(--white); border: none; padding: 12px 28px; font-family: inherit; font-size: 0.76rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border-radius: 2px; transition: background 0.2s; }
    .btn-submit:hover { background: var(--maroon); }
    .offices-label { font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--maroon); font-weight: 600; margin-bottom: 18px; display: block; }
    .office-entry { margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(0,0,0,0.07); }
    .office-entry:last-child { border-bottom: none; }
    .office-entry strong { display: block; font-size: 0.8rem; font-weight: 700; color: var(--text-dark); margin-bottom: 5px; }
    .office-entry p, .office-entry a { font-size: 0.78rem; color: #777; line-height: 1.65; display: block; text-decoration: none; margin: 0; }
    .office-entry a:hover { color: var(--maroon); }
    .map-link { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--maroon); text-decoration: none; display: inline-flex; align-items: center; gap: 5px; margin-top: 8px; }

    /* FOOTER */
    .footer { background: var(--near-black); padding: 56px 0 28px; }
    .footer-top { display: grid; grid-template-columns: 1.2fr 1fr 1fr 1fr; gap: 44px; margin-bottom: 44px; }
    .footer-brand-p { font-size: 0.78rem; color: rgba(255,255,255,0.38); line-height: 1.7; margin-top: 16px; max-width: 240px; }
