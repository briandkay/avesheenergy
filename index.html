<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aveshe Energy — Account Setup</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .box {
      background: white;
      padding: 48px;
      border-radius: 8px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .box h1 {
      color: #6a1f1f;
      font-size: 1.4rem;
      margin-bottom: 8px;
    }
    .box p {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .logo {
      font-size: 2rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">☀️</div>
    <h1>Aveshe Energy</h1>
    <p>Setting up your account, please wait...</p>
  </div>
  <script>
    // This page handles all Netlify Identity redirects
    window.netlifyIdentity.on("init", user => {
      if (user) {
        // Already logged in — go to admin
        window.location.href = "/admin/";
      }
    });

    window.netlifyIdentity.on("login", user => {
      // After login — go to admin
      window.location.href = "/admin/";
    });

    // Auto open the identity modal when this page loads
    // so users can confirm their account
    window.addEventListener("load", () => {
      // Check if there's a token in the URL (from invite/reset email)
      const hash = window.location.hash;
      if (hash && (hash.includes("confirmation_token") || hash.includes("recovery_token") || hash.includes("invite_token") || hash.includes("access_token"))) {
        window.netlifyIdentity.open();
      } else {
        window.location.href = "/admin/";
      }
    });
  </script>
</body>
</html>
